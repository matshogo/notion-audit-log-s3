AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Notion Webhook to S3 Audit Log

Parameters:
  WebhookSecret:
    Type: String
    Description: Webhook認証用のシークレット（Notionで設定するカスタムヘッダーの値）
    NoEcho: true
    Default: ''

Resources:
  # S3バケット
  AuditLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'notion-audit-logs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 2555  # 7年保管
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Lambda関数
  NotionWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: notion-webhook-handler
      CodeUri: lambda/
      Handler: handler.lambda_handler
      Runtime: python3.9
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref AuditLogBucket
          WEBHOOK_SECRET: !Ref WebhookSecret
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AuditLogBucket
      Events:
        WebhookApi:
          Type: Api
          Properties:
            Path: /webhook
            Method: post
            RestApiId: !Ref NotionWebhookApi

  # API Gateway
  NotionWebhookApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      EndpointConfiguration:
        Type: REGIONAL

Outputs:
  WebhookUrl:
    Description: NotionのWebhook URLとして設定するエンドポイント
    Value: !Sub 'https://${NotionWebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook'
  
  BucketName:
    Description: Audit logが保存されるS3バケット名
    Value: !Ref AuditLogBucket
  
  FunctionName:
    Description: Lambda関数名
    Value: !Ref NotionWebhookFunction
