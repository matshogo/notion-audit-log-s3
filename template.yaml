AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Notion Webhook to S3 Audit Log

Parameters:
  WebhookSecret:
    Type: String
    Description: Webhook認証用のシークレット（Notionで設定するカスタムヘッダーの値）
    NoEcho: true
    Default: ''

  NotificationType:
    Type: String
    Description: 通知先の種類（none=無効, email=メール通知, slack=Slack通知）
    Default: 'none'
    AllowedValues:
      - none
      - email
      - slack

  NotificationEmail:
    Type: String
    Description: メール通知先アドレス（NotificationType=emailの場合に必要）
    Default: ''

  SlackWebhookUrl:
    Type: String
    Description: Slack Incoming Webhook URL（NotificationType=slackの場合に必要）
    NoEcho: true
    Default: ''

  NotionApiKey:
    Type: String
    Description: Notion Internal Integration Token（Notionダッシュボード連携用）
    NoEcho: true
    Default: ''

  NotionDatabaseId:
    Type: String
    Description: Audit logを書き込むNotionデータベースのID
    Default: ''

  ImportLogLevel:
    Type: String
    Description: Notionへの取り込み対象（all=全イベント, page_publish_only=ページ公開のみ）
    Default: 'all'
    AllowedValues:
      - all
      - page_publish_only

Conditions:
  EnableEmailNotification: !Equals [!Ref NotificationType, 'email']

Resources:
  # S3バケット
  AuditLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'notion-audit-logs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 2555  # 7年保管
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Lambda関数
  NotionWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: notion-webhook-handler
      CodeUri: lambda/
      Handler: handler.lambda_handler
      Runtime: python3.9
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref AuditLogBucket
          WEBHOOK_SECRET: !Ref WebhookSecret
          NOTIFICATION_TYPE: !Ref NotificationType
          SNS_TOPIC_ARN: !If [EnableEmailNotification, !Ref PagePublishNotificationTopic, '']
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          NOTION_API_KEY: !Ref NotionApiKey
          NOTION_DATABASE_ID: !Ref NotionDatabaseId
          IMPORT_LOG_LEVEL: !Ref ImportLogLevel
          IMPORT_FUNCTION_NAME: !Ref S3ToNotionImportFunction
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AuditLogBucket
        - LambdaInvokePolicy:
            FunctionName: !Ref S3ToNotionImportFunction
        - !If
          - EnableEmailNotification
          - SNSPublishMessagePolicy:
              TopicName: !GetAtt PagePublishNotificationTopic.TopicName
          - !Ref 'AWS::NoValue'
      Events:
        WebhookApi:
          Type: Api
          Properties:
            Path: /webhook
            Method: post
            RestApiId: !Ref NotionWebhookApi

  # S3→Notion一括インポート用Lambda
  S3ToNotionImportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: notion-s3-to-notion-importer
      CodeUri: lambda/
      Handler: importer.lambda_handler
      Runtime: python3.9
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref AuditLogBucket
          NOTION_API_KEY: !Ref NotionApiKey
          NOTION_DATABASE_ID: !Ref NotionDatabaseId
          IMPORT_LOG_LEVEL: !Ref ImportLogLevel
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref AuditLogBucket
      Events:
        ScheduledImport:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Description: 6時間ごとにS3→Notionインポートを実行
            Enabled: false

  # API Gateway
  NotionWebhookApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      EndpointConfiguration:
        Type: REGIONAL

  # SNSトピック（メール通知用）
  PagePublishNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: EnableEmailNotification
    Properties:
      TopicName: notion-page-publish-notification

  PagePublishEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: EnableEmailNotification
    Properties:
      TopicArn: !Ref PagePublishNotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

Outputs:
  WebhookUrl:
    Description: NotionのWebhook URLとして設定するエンドポイント
    Value: !Sub 'https://${NotionWebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook'
  
  BucketName:
    Description: Audit logが保存されるS3バケット名
    Value: !Ref AuditLogBucket
  
  FunctionName:
    Description: Lambda関数名
    Value: !Ref NotionWebhookFunction
  
  ImportFunctionName:
    Description: S3→Notionインポート用Lambda関数名
    Value: !Ref S3ToNotionImportFunction
