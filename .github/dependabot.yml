version: 2
updates:
  # GitHub Actionsの依存関係を自動更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Pythonの依存関係を自動更新（requirements.txtがある場合）
  - package-ecosystem: "pip"
    directory: "/lambda"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
