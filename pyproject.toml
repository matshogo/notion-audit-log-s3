[tool.bandit]
exclude_dirs = [".aws-sam", ".git", "tests"]
skips = ["B101"]  # assert_used - テストで使用するため除外

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | \.aws-sam
)/
'''
